<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>
        BMI計算機
    </title>
    <script>
        function BMIcalculater() {
        let a = document.getElementById("taijuu").value;
        let b = document.getElementById("sintyou").value;
        document.getElementById("keisankekka").textContent = a/(b*b);
        if (a/(b*b) < 18.5) {
            document.getElementById("yabasa").textContent = "ご飯食たべよう！";
        } else if (a/(b*b) >= 25) {
            document.getElementById("yabasa").textContent = "ダイエットしましょう！";
        } else {
            document.getElementById("yabasa").textContent = "普通！";
        }
        }
    </script>
</head>
<body>
    体重:<input id="taijuu" value="55"><br>[kg]
    身長:<input id="sintyou" value="1.8"><br>[m]
    やばさ:<p id="yabasa"></p>
    計算結果:<p id="keisankekka"></p><br>
    <button onclick="BMIcalculater()">check</button> 
</body>
</html>
